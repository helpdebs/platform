<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste Supabase</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 360px;
      background: #fff;
      border: 1px solid #dcddea;
      border-radius: 16px;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }
    .build {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
    }
    input {
      border: 1px solid #dcddea;
    }
    button {
      border: 0;
      background: #7c6cff;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: white;
      color: #1c1c28;
      border: 1px solid #dcddea;
    }
    .status {
      margin-top: 8px;
      padding: 12px;
      border-radius: 10px;
      white-space: pre-wrap;
      font-size: 14px;
      display: none;
      border: 1px solid #dcddea;
    }
    .show { display: block; }
    .error {
      color: #c73434;
      background: #fff5f5;
      border-color: #f0c7c7;
    }
    .success {
      color: #1f8f53;
      background: #f3fff7;
      border-color: #c8ebd7;
    }
    .info {
      color: #334;
      background: #fafaff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Criar conta</h1>
    <div class="build">build: TESTE-SUPABASE-02</div>

    <input id="name" type="text" placeholder="Nome completo" />
    <input id="email" type="email" placeholder="Email novo" />
    <input id="password" type="password" placeholder="Senha" />

    <button id="test-btn" class="secondary" type="button">Testar conexão</button>
    <button id="signup-btn" type="button">Criar conta</button>

    <div id="status" class="status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://pgdanuifukzisyummpz.supabase.co";
    const SUPABASE_KEY = "COLE_AQUI_A_PUBLISHABLE_KEY_COMPLETA_COPIADA_PELO_BOTAO";

    const statusBox = document.getElementById("status");
    const testBtn = document.getElementById("test-btn");
    const signupBtn = document.getElementById("signup-btn");

    function setStatus(message, type = "info") {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`;
    }

    function setLoading(button, on, labelOn, labelOff) {
      button.disabled = on;
      button.textContent = on ? labelOn : labelOff;
    }

    async function testConnection() {
      setLoading(testBtn, true, "Testando...", "Testar conexão");
      setStatus("Testando conexão com o Supabase...", "info");

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/settings`, {
          method: "GET",
          headers: {
            apikey: SUPABASE_KEY
          }
        });

        const text = await res.text();

        if (res.ok) {
          setStatus("Conexão OK.\n\nResposta:\n" + text, "success");
        } else {
          setStatus(`Conexão respondeu com erro ${res.status}.\n\n${text}`, "error");
        }
      } catch (err) {
        setStatus(
          "Falha de rede ao tentar falar com o Supabase.\n\n" +
          err.message +
          "\n\nQuase sempre isso é:\n" +
          "1) publishable key copiada incompleta\n" +
          "2) extensão/antivírus bloqueando\n" +
          "3) navegador bloqueando requisição",
          "error"
        );
      } finally {
        setLoading(testBtn, false, "Testando...", "Testar conexão");
      }
    }

    async function signup() {
      setLoading(signupBtn, true, "Criando...", "Criar conta");

      try {
        const fullName = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!fullName || !email || !password) {
          setStatus("Preencha nome, email e senha.", "error");
          return;
        }

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        setStatus("Tentando criar a conta...", "info");

        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              full_name: fullName
            }
          }
        });

        if (error) {
          setStatus("Erro no signUp:\n" + error.message, "error");
          return;
        }

        if (!data.user) {
          setStatus("O signUp respondeu sem user.", "error");
          return;
        }

        const { error: profileError } = await supabase
          .from("profiles")
          .upsert({
            id: data.user.id,
            full_name: fullName,
            email: email
          });

        if (profileError) {
          setStatus("Conta criada no Auth, mas falhou em profiles:\n" + profileError.message, "error");
          return;
        }

        setStatus("Conta criada com sucesso.", "success");
      } catch (err) {
        setStatus("Erro inesperado:\n" + err.message, "error");
      } finally {
        setLoading(signupBtn, false, "Criando...", "Criar conta");
      }
    }

    testBtn.addEventListener("click", testConnection);
    signupBtn.addEventListener("click", signup);
  </script>
</body>
</html>
