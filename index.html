<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Help Debs • Login</title>

  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1c1c28;
      --muted: #6a6a7a;
      --border: #dcddea;
      --accent: #7c6cff;
      --danger: #c73434;
      --success: #1f8f53;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      width: 320px;
      border: 1px solid var(--border);
    }

    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    button {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
    }

    .error { color: var(--danger); }
    .success { color: var(--success); }

  </style>
</head>

<body>

<div class="card">
  <h2>Criar conta</h2>

  <input id="name" placeholder="Nome completo">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">

  <button id="btn">Criar conta</button>

  <div id="status" class="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = "https://pgdanuifukzisyummpz.supabase.co";
  const SUPABASE_KEY = "sb_publishable_81NM6F08rsXXSCgjWl4iSg_v99cdVpo";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const btn = document.getElementById("btn");
  const statusBox = document.getElementById("status");

  btn.onclick = async () => {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!name || !email || !password) {
      statusBox.innerText = "Preencha tudo";
      statusBox.className = "status error";
      return;
    }

    btn.disabled = true;
    btn.innerText = "Criando...";

    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: name }
      }
    });

    if (error) {
      statusBox.innerText = error.message;
      statusBox.className = "status error";
      btn.disabled = false;
      btn.innerText = "Criar conta";
      return;
    }

    const user = data.user;

    if (user) {
      await supabase.from("profiles").upsert({
        id: user.id,
        full_name: name,
        email: email
      });
    }

    statusBox.innerText = "Conta criada!";
    statusBox.className = "status success";

    btn.disabled = false;
    btn.innerText = "Criar conta";
  };
</script>

</body>
</html>
